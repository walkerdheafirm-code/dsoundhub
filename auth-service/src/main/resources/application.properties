spring.application.name=auth-service
server.port=8081

# Database Configuration (PostgreSQL - users_db)
spring.datasource.url=jdbc:postgresql://localhost:5432/users_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Java 21 Virtual Threads
spring.threads.virtual.enabled=true

# Custom JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Spring Session (Redis-backed HTTP Session untuk Admin)
spring.session.store-type=redis
spring.session.redis.namespace=dsoundhub:auth:session
server.servlet.session.timeout=3600

# Internal API Key for service-to-service communication
internal.api.key=${INTERNAL_API_KEY}


