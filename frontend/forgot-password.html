<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D'SoundHub — Reset Password</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container login-wrapper">
    <div class="card login-card" style="max-width: 440px;">
      <div class="text-center mb-4">
        <h2 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.25rem;">
          <span class="brand-icon">D</span> D'SoundHub
        </h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Reset Password</p>
      </div>

      <!-- Step 1: Input Email -->
      <div id="step-email">
        <p style="color: var(--text-muted); font-size: 0.9rem; text-align: center; margin-bottom: 1.5rem;">
          Masukkan email terdaftar untuk menerima kode OTP reset password.
        </p>
        <form id="forgot-form" onsubmit="handleForgotPassword(event)">
          <div class="form-group">
            <label for="fp-email">Email Address</label>
            <input type="email" id="fp-email" class="form-control" placeholder="Enter your email" required autocomplete="email">
          </div>
          <button type="submit" class="btn btn-primary btn-block mt-4" id="fp-send-btn">
            Kirim Kode OTP
          </button>
        </form>
        <div style="text-align: center; margin-top: 1rem;">
          <a href="login.html" style="font-size: 0.85rem; color: var(--accent-secondary);">Kembali ke Login</a>
        </div>
      </div>

      <!-- Step 2: Input OTP + New Password -->
      <div id="step-reset" style="display: none;">
        <p style="color: var(--text-muted); font-size: 0.9rem; text-align: center; margin-bottom: 0.25rem;">
          Kode OTP telah dikirim ke:
        </p>
        <p id="fp-email-display" style="font-weight: 600; color: var(--accent-secondary); text-align: center; font-size: 0.95rem; margin-bottom: 1.5rem;"></p>

        <form id="reset-form" onsubmit="handleResetPassword(event)">
          <div class="form-group">
            <label>Kode OTP</label>
            <div style="display: flex; gap: 8px; justify-content: center; margin: 0.5rem 0 1rem;">
              <input type="text" class="rp-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus
                     oninput="rpMoveNext(this, 0)" onkeydown="rpMoveBack(this, 0)" style="width: 48px; height: 56px; text-align: center; font-size: 1.5rem; font-weight: 700; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-main); outline: none;">
              <input type="text" class="rp-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]"
                     oninput="rpMoveNext(this, 1)" onkeydown="rpMoveBack(this, 1)" style="width: 48px; height: 56px; text-align: center; font-size: 1.5rem; font-weight: 700; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-main); outline: none;">
              <input type="text" class="rp-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]"
                     oninput="rpMoveNext(this, 2)" onkeydown="rpMoveBack(this, 2)" style="width: 48px; height: 56px; text-align: center; font-size: 1.5rem; font-weight: 700; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-main); outline: none;">
              <input type="text" class="rp-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]"
                     oninput="rpMoveNext(this, 3)" onkeydown="rpMoveBack(this, 3)" style="width: 48px; height: 56px; text-align: center; font-size: 1.5rem; font-weight: 700; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-main); outline: none;">
              <input type="text" class="rp-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]"
                     oninput="rpMoveNext(this, 4)" onkeydown="rpMoveBack(this, 4)" style="width: 48px; height: 56px; text-align: center; font-size: 1.5rem; font-weight: 700; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-main); outline: none;">
              <input type="text" class="rp-otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]"
                     oninput="rpMoveNext(this, 5)" onkeydown="rpMoveBack(this, 5)" style="width: 48px; height: 56px; text-align: center; font-size: 1.5rem; font-weight: 700; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-main); outline: none;">
            </div>
            <input type="hidden" id="rp-email" value="">
            <input type="hidden" id="rp-otp-code" value="">
          </div>

          <div class="form-group">
            <label for="rp-new-password">Password Baru</label>
            <input type="password" id="rp-new-password" class="form-control" placeholder="Min. 8 karakter" required minlength="8" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label for="rp-confirm-password">Konfirmasi Password</label>
            <input type="password" id="rp-confirm-password" class="form-control" placeholder="Ulangi password baru" required minlength="8" autocomplete="new-password">
          </div>

          <button type="submit" class="btn btn-primary btn-block mt-4" id="rp-reset-btn">
            Reset Password
          </button>
        </form>

        <div style="text-align: center; margin-top: 1rem;">
          <a href="login.html" style="font-size: 0.85rem; color: var(--accent-secondary);">Kembali ke Login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    function rpMoveNext(input, index) {
      if (input.value.length === 1 && index < 5) {
        document.querySelectorAll('.rp-otp-input')[index + 1].focus();
      }
      rpUpdateOtp();
    }

    function rpMoveBack(input, index) {
      if (event.key === 'Backspace' && input.value.length === 0 && index > 0) {
        document.querySelectorAll('.rp-otp-input')[index - 1].focus();
      }
    }

    function rpUpdateOtp() {
      const inputs = document.querySelectorAll('.rp-otp-input');
      const code = Array.from(inputs).map(i => i.value).join('');
      document.getElementById('rp-otp-code').value = code;
    }

    async function handleForgotPassword(e) {
      e.preventDefault();
      const email = document.getElementById('fp-email').value.trim();
      const btn = document.getElementById('fp-send-btn');

      btn.disabled = true;
      btn.textContent = 'Mengirim...';

      try {
        const response = await apiCall(`${AUTH_SERVICE_URL}/api/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.message || 'Gagal mengirim OTP');
        }

        // Show step 2
        document.getElementById('step-email').style.display = 'none';
        document.getElementById('step-reset').style.display = 'block';
        document.getElementById('rp-email').value = email;
        document.getElementById('fp-email-display').textContent = email;
        showToast('Kode OTP telah dikirim ke email Anda!', 'success');

      } catch (error) {
        showToast(error.message, 'danger');
        btn.disabled = false;
        btn.textContent = 'Kirim Kode OTP';
      }
    }

    async function handleResetPassword(e) {
      e.preventDefault();
      const email = document.getElementById('rp-email').value;
      const otpCode = document.getElementById('rp-otp-code').value;
      const newPassword = document.getElementById('rp-new-password').value;
      const confirmPassword = document.getElementById('rp-confirm-password').value;

      if (otpCode.length !== 6) {
        showToast('Masukkan 6 digit kode OTP', 'warning');
        return;
      }

      if (newPassword !== confirmPassword) {
        showToast('Password tidak cocok', 'warning');
        return;
      }

      const btn = document.getElementById('rp-reset-btn');
      btn.disabled = true;
      btn.textContent = 'Mereset...';

      try {
        const response = await apiCall(`${AUTH_SERVICE_URL}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, code: otpCode, newPassword })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.message || 'Reset password gagal');
        }

        showToast('Password berhasil direset! Silakan login.', 'success');
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);

      } catch (error) {
        showToast(error.message, 'danger');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    }
  </script>
</body>
</html>
