<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D'SoundHub — Login & Registration</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container login-wrapper">
    <div class="card login-card">
      <div class="text-center mb-4">
        <h2 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.25rem;">
          <span class="brand-icon">D</span> D'SoundHub
        </h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Audio Distribution & Royalty Platform</p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <div id="login-tab" class="tab-content active">
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="login-username">Username</label>
            <input type="text" id="login-username" class="form-control" placeholder="Enter your username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block mt-4" id="login-btn">
            Sign In
          </button>
          <div class="form-footer" style="text-align: center; margin-top: 0.75rem;">
            <a href="forgot-password.html" style="font-size: 0.85rem; color: var(--accent-secondary);">Forgot Password?</a>
          </div>
        </form>
      </div>

      <!-- Register Form -->
      <div id="register-tab" class="tab-content">
        <form id="register-form" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="register-username">Username</label>
            <input type="text" id="register-username" class="form-control" placeholder="Choose a username" required minlength="3" maxlength="50" autocomplete="username">
          </div>
          <div class="form-group">
            <label for="register-email">Email Address</label>
            <input type="email" id="register-email" class="form-control" placeholder="Enter your email" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" class="form-control" placeholder="Create a strong password" required minlength="6" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label for="register-role">I want to join as</label>
            <select id="register-role" class="form-control" required>
              <option value="LISTENER">Listener (Explore & buy music)</option>
              <option value="ARTIST">Artist (Upload & monetize audio)</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary btn-block mt-4" id="register-btn">
            Create Account
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    window.addEventListener('DOMContentLoaded', () => {
      const token = getToken();
      const role = getRole();
      if (token && role) {
        if (role === 'ADMIN') window.location.href = 'dashboard-admin.html';
        else if (role === 'ARTIST') window.location.href = 'dashboard-artist.html';
        else if (role === 'LISTENER') window.location.href = 'dashboard-listener.html';
      }
    });

    function switchTab(tab) {
      // Toggle tabs
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

      if (tab === 'login') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('login-tab').classList.add('active');
      } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('register-tab').classList.add('active');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const response = await fetch(`${AUTH_SERVICE_URL}/api/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          let errMsg = errorData.error || errorData.message;
          if (!errMsg) {
            const values = Object.values(errorData);
            if (values.length > 0) {
              errMsg = values.join(', ');
            }
          }
          throw new Error(errMsg || 'Login failed. Invalid credentials.');
        }

        const data = await response.json();
        
        // Save auth details
        setAuth(data.token, data.role, data.username, data.sessionId);
        
        showToast('Login successful! Redirecting...', 'success');

        // Redirect after a short delay to display toast
        setTimeout(() => {
          if (data.role === 'ADMIN') window.location.href = 'dashboard-admin.html';
          else if (data.role === 'ARTIST') window.location.href = 'dashboard-artist.html';
          else window.location.href = 'dashboard-listener.html';
        }, 1000);

      } catch (error) {
        const errMsg = error.message || '';
        if (errMsg.toLowerCase().includes('belum diverifikasi')) {
          showToast(errMsg, 'warning');
          // Show confirmation link
          const confirmHtml = `<div id="unverified-banner" style="margin-top: 0.75rem; text-align: center; background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.25); border-radius: 10px; padding: 0.75rem;">
            <p style="font-size: 0.85rem; color: var(--warning); margin-bottom: 0.5rem;">${errMsg}</p>
            <a href="verify-otp.html" style="font-size: 0.85rem; color: var(--accent-secondary); font-weight: 600;">Konfirmasi Akun</a>
          </div>`;
          document.getElementById('login-form').insertAdjacentHTML('afterend', confirmHtml);
        } else {
          showToast(errMsg, 'danger');
        }
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('register-username').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value;
      const role = document.getElementById('register-role').value;
      const btn = document.getElementById('register-btn');

      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const response = await fetch(`${AUTH_SERVICE_URL}/api/auth/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, email, password, role })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          let errMsg = errorData.error || errorData.message;
          if (!errMsg) {
            const values = Object.values(errorData);
            if (values.length > 0) {
              errMsg = values.join(', ');
            }
          }
          throw new Error(errMsg || 'Registration failed.');
        }

        const data = await response.json();
        const registeredEmail = data.email || email;
        showToast('Registrasi berhasil! Cek email untuk OTP.', 'success');

        // Redirect to OTP verification page
        setTimeout(() => {
          window.location.href = `verify-otp.html?email=${encodeURIComponent(registeredEmail)}`;
        }, 1200);

      } catch (error) {
        showToast(error.message, 'danger');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
