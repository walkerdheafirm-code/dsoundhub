server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**, /api/admin/**

        - id: audio-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/audio/**, /api/royalties/**, /api/withdraw/**

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:3000"
              - "http://localhost:5500"
              - "http://127.0.0.1:5500"
              - "http://localhost:8080"
              - "http://localhost:8081"
              - "http://localhost:8082"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true
